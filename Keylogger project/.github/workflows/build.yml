name: Build & Test Dashboard

on:
  push:
    branches: [master, main, develop]
    paths:
      - 'frontend-dashboard/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [master, main, develop]
    paths:
      - 'frontend-dashboard/**'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'frontend-dashboard/package-lock.json'

      - name: Install dependencies
        working-directory: ./frontend-dashboard
        run: npm ci

      - name: Run ESLint
        working-directory: ./frontend-dashboard
        run: npm run lint
        continue-on-error: true

      - name: Check code formatting
        working-directory: ./frontend-dashboard
        run: npm run format:check
        continue-on-error: true

      - name: Run TypeScript type check
        working-directory: ./frontend-dashboard
        run: npm run type-check

      - name: Build application
        working-directory: ./frontend-dashboard
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: 'http://localhost:5000'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build-${{ matrix.node-version }}
          path: frontend-dashboard/.next/
          retention-days: 5

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-dashboard
          push: false
          tags: keylogger-dashboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  performance:
    runs-on: ubuntu-latest
    needs: build
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: 'frontend-dashboard/package-lock.json'

      - name: Install dependencies
        working-directory: ./frontend-dashboard
        run: npm ci

      - name: Build for production
        working-directory: ./frontend-dashboard
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: 'http://localhost:5000'

      - name: Analyze bundle size
        working-directory: ./frontend-dashboard
        run: |
          echo "## Bundle Analysis" >> $GITHUB_STEP_SUMMARY
          npm run build 2>&1 | grep -E "Route|Size" >> $GITHUB_STEP_SUMMARY || true
        continue-on-error: true
